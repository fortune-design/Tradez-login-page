<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
    <link rel="stylesheet" href="Test.css">
</head>
<body>
    <div class="container">
      <div class="section">
            <i class="fa-solid fa-star fa-2xl star"></i>
          <div class="greetings">
              <h1>Welcome Back!</h1>
          </div>
      </div>

        <div class="sign-in">
            <div class="brand">
                <h2><i class="fa-brands fa-studiovinari"></i>Tradez</h2>
                <p>Login to Your Account</p>
            </div>

            <div class="details">
                <label for="name">User Name</label>
                <input type="text" placeholder="Username"><br>
                <label for="password">Password</label>
                <input type="password" placeholder="Password">
            </div>

            <div class="details-1">
                <p><input type="checkbox" id="checkbox">Remember me</p>
                <p>Forget Password</p>
            </div>

            <div class="btn">
                <button>Sign in</button>
            </div>
             
            <div>
                <p>Or sign in with</p>
            </div>

            <div class="links">
               <div class="socials">
                   <button class="socials-btn"><i class="fa-brands fa-google"></i>Google</button>
                   <button class="socials-btn-1"><i class="fa-brands fa-facebook"></i>Facebook</button>
                </div>
                <p>Don't have an account? 
                    <a href="#">Register Here</a>
                </p>
            </div>
              <p><a href="#">www.DownloadNewThemes.com</a></p>
        </div>
    </div>
</body>
</html>
